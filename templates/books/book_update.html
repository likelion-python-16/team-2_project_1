{% extends 'base.html' %}
{% load static %}

{% block head_extra %}
<link rel="stylesheet" href="{% static 'css/book_update.css' %}">
{% endblock %}

{% block content %}
<div class="form-wrapper">
  <h2>📝 도서 수정</h2>

  <form id="bookUpdateForm">
    <div class="form-group">
      <label for="title">제목</label>
      <input type="text" name="title" id="title" required>
    </div>

    <div class="form-group">
      <label for="authorNameInput">저자 이름</label>
      <input type="text" name="author_name" id="authorNameInput" required>
    </div>

    <div class="form-group">
      <label for="newAuthorInput" class="small-label">(선택) 원하는 저자가 없다면 여기서 추가해주세요</label>
      <input type="text" name="new_author_name" id="newAuthorInput" placeholder="새 저자 이름">
    </div>

    <div class="form-group">
      <label for="published_at">출간일</label>
      <input type="date" name="published_at" id="published_at" required>
    </div>

    <div class="form-group">
      <label for="description">설명</label>
      <textarea name="description" id="description" rows="5" required></textarea>
    </div>

    <div class="button-group">
      <button type="submit" class="primary-btn">✏️ 수정</button>
      <a href="/books/list/" class="secondary-btn">📋 목록으로</a>
    </div>
  </form>
</div>
{% endblock %}

<script>
const bookId = window.location.pathname.split('/')[3];

// 도서 정보 불러오기
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const response = await axios.get(`/books/api/books/${bookId}/`);
    const book = response.data;

    document.getElementById('title').value = book.title;
    document.getElementById('authorNameInput').value = book.author_name;
    document.getElementById('published_at').value = book.published_at;
    document.getElementById('description').value = book.description;
  } catch (err) {
    console.error("도서 정보 로드 실패", err);
    alert("도서 정보를 불러올 수 없습니다.");
  }
});

// 폼 제출
document.getElementById("bookUpdateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const form = e.target;
  const formData = new FormData(form);

  const authorName = form.querySelector("#authorNameInput").value.trim();
  if (authorName) {
    formData.append("author_name", authorName);
    formData.delete("author");
  }

  try {
    await axios.put(`/books/api/books/${bookId}/`, formData, {
      headers: {
        "X-CSRFToken": getCookie("csrftoken"),
        "Content-Type": "multipart/form-data"
      }
    });
    alert("도서가 수정되었습니다.");
    location.href = "/books/list/";
  } catch (err) {
    console.error("도서 수정 실패", err.response?.data);
    alert("도서 수정에 실패했습니다.");
  }
});
</script>
