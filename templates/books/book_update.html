{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h2>📝 도서 수정</h2>

  <form id="bookUpdateForm">
    <label>제목: <input type="text" name="title" id="title" required></label><br>
    <label>저자 이름: <input type="text" name="author_name" id="authorNameInput" required></label><br>

    <label>(선택)원하는 저자가 없다면 여기서 추가해주세요:
      <input type="text" name="author_name" id="authorNameInput" placeholder="새 저자 이름">
    </label><br>
    
    <label>출간일: <input type="date" name="published_at" id="published_at" required></label><br>
    <label>설명: <textarea name="description" id="description" required></textarea></label><br>
    <button type="submit">✏️ 수정</button>
    <a href="/books/list/">📋 목록으로</a>
  </form>
</div>

<script>
// URL에서 책 ID 가져오기
const bookId = window.location.pathname.split('/')[3]; // /books/update/123/ -> 123

// 페이지 로드시 기존 데이터 가져오기
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const response = await axios.get(`/books/api/books/${bookId}/`);
    const book = response.data;
    
    // 폼에 기존 값 채우기
    document.getElementById('title').value = book.title;
    document.getElementById('author').value = book.author;
    document.getElementById('published_at').value = book.published_at;
    document.getElementById('description').value = book.description;
  } catch (err) {
    console.error("도서 정보 로드 실패", err);
    alert("도서 정보를 불러올 수 없습니다.");
  }
});

  const authorName = form.querySelector("#authorNameInput").value.trim();
  if (authorName) {
    formData.append("author_name", authorName);
    formData.delete("author");
  }

// 수정 폼 제출
document.getElementById("bookUpdateForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const formData = new FormData(form);

  try {
    await axios.put(`/books/api/books/${bookId}/`, formData, {
      headers: {
        "X-CSRFToken": getCookie("csrftoken"),
        "Content-Type": "multipart/form-data"
      }
    });
    alert("도서가 수정되었습니다.");
    location.href = "/books/list/";
  } catch (err) {
    console.error("도서 수정 실패", err.response?.data);
    alert("도서 수정에 실패했습니다.");
  }
});
</script>
{% endblock %}
