{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h2>📝 도서 수정</h2>

  <form id="bookUpdateForm">
    <label>제목: <input type="text" name="title" id="title" required></label><br>

    <!-- 기존 저자 선택 드롭다운 -->
    <label>저자 선택:
      <select name="author" id="authorSelect">
        <option value="">-- 기존 저자 선택 --</option>
        {% for author in authors %}
          <option value="{{ author.id }}">{{ author.id }} - {{ author.author }}</option>
        {% endfor %}
      </select>
    </label><br>

    <!-- 새 저자 입력 -->
    <label>(선택) 원하는 저자가 없다면 여기서 추가해주세요:
      <input type="text" name="author_name" id="authorNameInput" placeholder="새 저자 이름">
    </label><br>

    <label>출간일: <input type="date" name="published_at" id="published_at" required></label><br>
    <label>설명: <textarea name="description" id="description" required></textarea></label><br>

    <button type="submit">✏️ 수정</button>
    <a href="/books/list/">📋 목록으로</a>
  </form>
</div>

<script>
function getCookie(name) {
  const value = `; ${document.cookie}`;  // ✅ 백틱(``) 사용
  const parts = value.split(`; ${name}=`);
  if (parts.length === 2) return parts.pop().split(';').shift();
}

const bookId = window.location.pathname.split('/')[3];

// 기존 도서 정보 로딩
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const response = await axios.get(`/books/api/books/${bookId}/`);  // ✅ 백틱으로 수정
    const book = response.data;

    document.getElementById('title').value = book.title;
    document.getElementById('published_at').value = book.published_at;
    document.getElementById('description').value = book.description;

    const authorSelect = document.getElementById('authorSelect');
    for (let option of authorSelect.options) {
      if (option.value == book.author) {
        option.selected = true;
        break;
      }
    }

  } catch (err) {
    console.error("도서 정보 로드 실패", err);
    alert("도서 정보를 불러올 수 없습니다.");
  }
});

// 수정 폼 제출
document.getElementById("bookUpdateForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const formData = new FormData(form);

  const authorName = form.querySelector("#authorNameInput").value.trim();
  const selectedAuthor = form.querySelector("#authorSelect").value;

  // 1. 둘 다 입력한 경우 경고
  if (authorName && selectedAuthor) {
    alert("⚠️ 기존 저자 선택 또는 새 저자 입력 중 하나만 해주세요.");
    return;
  }

  // 2. 새 저자만 입력한 경우 → 중복 체크
  if (authorName && !selectedAuthor) {
    try {
      const res = await axios.get("/books/api/authors/");
      const duplicates = res.data.filter(
        a => a.author.trim().toLowerCase() === authorName.toLowerCase()
      );

      if (duplicates.length > 0) {
        const latestAuthor = duplicates.reduce((latest, current) =>
          current.id > latest.id ? current : latest
        );

        const books = latestAuthor.books || [];
        const bookList = books.length
          ? `\n\n해당 저자가 작성한 책 목록:\n- ${books.join("\n- ")}`
          : "";

        const confirmProceed = confirm(
          `⚠️ '${authorName}'이라는 이름의 저자가 이미 ${duplicates.length}명 존재합니다.${bookList}\n\n정말 새 저자로 등록하시겠습니까?`
        );
        if (!confirmProceed) return;
      }

      formData.append("author_name", authorName);
      formData.delete("author");
      formData.append("force_new_author", "true");

    } catch (err) {
      alert("⚠️ 저자 중복 확인 중 오류가 발생했습니다.");
      return;
    }
  }

  // 3. 도서 수정 시도 (기본)
  try {
    await axios.put(`/books/api/books/${bookId}/`, formData, {
      headers: {
        "X-CSRFToken": getCookie("csrftoken"),
        "Content-Type": "multipart/form-data"
      }
    });
    alert("도서가 수정되었습니다.");
    location.href = "/books/list/";

  } catch (err) {
    const detail = err.response?.data?.detail;
    if (detail) {
      const confirmResult = confirm(
        `${detail}\n\n⚠️ 그래도 수정하시겠습니까?`
      );
      if (!confirmResult) return;

      // ✅ 사용자 확인 후 강제 수정 재시도
      try {
        await axios.put(`/books/api/books/${bookId}/?force=true`, formData, {
          headers: {
            "X-CSRFToken": getCookie("csrftoken"),
            "Content-Type": "multipart/form-data"
          }
        });
        alert("도서가 수정되었습니다.");
        location.href = "/books/list/";
      } catch (e2) {
        alert("도서 수정이 최종적으로 실패했습니다.");
      }

    } else {
      alert("도서 수정에 실패했습니다.");
    }
  }
});

</script>
{% endblock %}
