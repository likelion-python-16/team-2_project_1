{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  {% include "head.html" %}
  <style>
    .book-card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
    .book-title { font-weight: bold; font-size: 1.2em; }
    .controls { margin: 20px 0; }
  </style>
</head>
<body>
  {% include "header.html" %}

  <div class="container">
    <h2>📚 도서 목록</h2>

    
    <div class="controls">
      <input type="text" id="searchInput" placeholder="도서 제목 검색">
      <select id="orderingSelect">
        <option value="">-- 정렬 선택 --</option>
        <option value="title">제목 오름차순</option>
        <option value="-title">제목 내림차순</option>
        <option value="avg_rating">평점 오름차순</option>
        <option value="-avg_rating">평점 내림차순</option>
      </select>
      <button id="searchBtn">🔍 검색</button>
    </div>

    
    <div id="bookList"></div>

    
    <div id="pagination"></div>
  </div>

  {% include "footer.html" %}

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const bookListEl = document.getElementById("bookList");
    const paginationEl = document.getElementById("pagination");

    const fetchBooks = async (params = {}) => {
      try {
        const response = await axios.get("/api/books/", { params });
        const data = response.data;

        
        bookListEl.innerHTML = data.results.map(book => `
          <div class="book-card">
            <div class="book-title">${book.title}</div>
            <div>저자: ${book.author_name}</div>
            <div>평균 평점: ${book.avg_rating} ⭐</div>
            <div>리뷰 수: ${book.review_count}</div>
            <div>등록일: ${book.created_at}</div>
          </div>
        `).join("");

        
        paginationEl.innerHTML = "";
        if (data.previous) {
          paginationEl.innerHTML += `<button onclick="loadPage('${data.previous}')">이전</button>`;
        }
        if (data.next) {
          paginationEl.innerHTML += `<button onclick="loadPage('${data.next}')">다음</button>`;
        }
      } catch (err) {
        console.error("도서 불러오기 실패", err);
        alert("도서 목록을 불러오는 중 오류가 발생");
      }
    };

    const loadPage = (url) => {
      axios.get(url)
        .then(res => fetchBooksFromData(res.data))
        .catch(err => console.error("페이지 이동 실패", err));
    };

    const fetchBooksFromData = (data) => {
      
      bookListEl.innerHTML = data.results.map(book => `
        <div class="book-card">
          <div class="book-title">${book.title}</div>
          <div>저자: ${book.author_name}</div>
          <div>평균 평점: ${book.avg_rating} ⭐</div>
          <div>리뷰 수: ${book.review_count}</div>
          <div>등록일: ${book.created_at}</div>
        </div>
      `).join("");

      paginationEl.innerHTML = "";
      if (data.previous) {
        paginationEl.innerHTML += `<button onclick="loadPage('${data.previous}')">이전</button>`;
      }
      if (data.next) {
        paginationEl.innerHTML += `<button onclick="loadPage('${data.next}')">다음</button>`;
      }
    };

    
    document.getElementById("searchBtn").addEventListener("click", () => {
      const search = document.getElementById("searchInput").value;
      const ordering = document.getElementById("orderingSelect").value;
      fetchBooks({ search, ordering });
    });

    
    fetchBooks();
  </script>
</body>
</html>
