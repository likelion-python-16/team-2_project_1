{% extends 'base.html' %}
{% load static %}

{% block head_extra %}
<link rel="stylesheet" href="{% static 'css/book_delete.css' %}">
{% endblock %}

{% block content %}
<div class="delete-wrapper">
  <h2>🗑️ 도서 삭제</h2>

  <div id="bookInfo">
    <p>로딩 중...</p>
  </div>

  <div id="deleteConfirm" style="display: none;">
    <p class="delete-warning">⚠️ 삭제된 도서는 복구할 수 없습니다. 정말 삭제하시겠습니까?</p>

    <div class="delete-actions">
      <button id="confirmDelete">🗑️ 삭제</button>
      <a href="/books/list/">↩️ 취소</a>
    </div>
  </div>
</div>

<script>
const bookId = window.location.pathname.split('/')[3];

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const response = await axios.get(`/books/api/books/${bookId}/`);
    const book = response.data;

    document.getElementById('bookInfo').innerHTML = `
      <div class="book-info-box">
        <h3>📖 ${book.title}</h3>
        <p><strong>저자:</strong> ${book.author}</p>
        <p><strong>출간일:</strong> ${book.published_at}</p>
        <p><strong>설명:</strong> ${book.description}</p>
      </div>
    `;

    document.getElementById('deleteConfirm').style.display = 'block';
  } catch (err) {
    console.error("도서 정보 로드 실패", err);
    document.getElementById('bookInfo').innerHTML = '<p style="color: red;">도서 정보를 불러올 수 없습니다.</p>';
  }
});

document.getElementById("confirmDelete").addEventListener("click", async () => {
  try {
    await axios.delete(`/books/api/books/${bookId}/`, {
      headers: { "X-CSRFToken": getCookie("csrftoken") }
    });
    alert("도서가 삭제되었습니다.");
    location.href = "/books/list/";
  } catch (err) {
    console.error("도서 삭제 실패", err);
    alert("도서 삭제에 실패했습니다.");
  }
});
</script>
{% endblock %}
