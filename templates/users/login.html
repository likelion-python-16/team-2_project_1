<!DOCTYPE html>
<html>
<head>
    <title>로그인</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/getCookie.js' %}"></script>
</head>
<body>
    <div class="form-container">
        <h2>로그인</h2>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="사용자명" required>
            <input type="password" id="password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>
        
        <div id="message"></div>
        <div class="link-container">
            <a href="{% url 'users:register_page' %}">계정이 없으신가요? 회원가입</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('/users/api/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('user_id', data.user_id);
                    messageDiv.innerHTML = '<div class="success-message">로그인 성공! 곧 북리스트로 이동합니다.</div>';
                    setTimeout(() => window.location.href = '/books/list/', 1000);
                } else {
                    messageDiv.innerHTML = '<div class="error-message">' + (data.non_field_errors?.[0] || '로그인에 실패했습니다.') + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="error-message">네트워크 오류가 발생했습니다.</div>';
            }
        });
    </script>
</body>
</html>
