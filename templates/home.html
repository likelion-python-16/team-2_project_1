<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  .home-container {
    max-width: 700px;
    margin: 100px auto;
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    background-color: #f7f4ed;
    padding: 50px 30px;
    border-radius: 16px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
  }

  #welcomeText {
    font-size: 32px;
    font-weight: bold;
    color: #3e3e3e;
    white-space: pre-wrap;
    min-height: 80px;
  }

  .login-link {
    display: inline-block;
    margin-top: 40px;
    padding: 12px 24px;
    background-color: #6c584c;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 18px;
    transition: background-color 0.3s;
  }

  .login-link:hover {
    background-color: #5b4b3e;
  }
</style>
</head>
<body>
    <div class="home-container">
        <h1 id="welcomeText"></h1>
        <a href="/users/login/" class="login-link">📚 관리하러 가기</a>
    </div>
    <script>
        const text = "도서관리 시스템에 오신 것을 환영합니다.";
        const target = document.getElementById("welcomeText");

        let index = 0;
        let typing = true;

        function animateText() {
            if (typing) {
            if (index < text.length) {
                target.textContent += text[index++];
                setTimeout(animateText, 100);
            } else {
                typing = false;
                setTimeout(animateText, 1000);  // 글 다 쓰고 1초 대기
            }
            } else {
            if (index > 0) {
                target.textContent = text.slice(0, --index);
                setTimeout(animateText, 50);
            } else {
                typing = true;
                setTimeout(animateText, 500);  // 모두 지우고 0.5초 대기
            }
            }
        }

        document.addEventListener("DOMContentLoaded", animateText);
    </script>
</body>
</html>
