{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  {% include "head.html" %}
  <style>
    .review-form {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .review-form input, .review-form textarea {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }
  </style>
</head>
<body>
  {% include "header.html" %}

  <div class="container">
    <h2>✍ 리뷰 등록/수정</h2>
    <div class="review-form">
      <input type="number" id="bookIdInput" placeholder="도서 ID">
      <input type="number" id="ratingInput" placeholder="평점 (1~5)" min="1" max="5">
      <textarea id="contentInput" placeholder="리뷰 내용"></textarea>

      <button id="createBtn">리뷰 등록</button>
      <button id="updateBtn">리뷰 수정</button>
    </div>
  </div>

  {% include "footer.html" %}

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const reviewId = new URLSearchParams(window.location.search).get("id"); // 수정할 리뷰 ID (있을 경우)
    const createBtn = document.getElementById("createBtn");
    const updateBtn = document.getElementById("updateBtn");

    // 리뷰 등록
    createBtn.addEventListener("click", async () => {
      const book = document.getElementById("bookIdInput").value;
      const rating = document.getElementById("ratingInput").value;
      const content = document.getElementById("contentInput").value;

      try {
        await axios.post("/api/reviews/", { book, rating, content });
        alert("리뷰 등록 성공!");
        window.location.href = `/books/?id=${book}`;
      } catch (err) {
        alert("리뷰 등록 실패: " + err.response?.data?.detail || err.message);
      }
    });

    // 리뷰 수정
    updateBtn.addEventListener("click", async () => {
      if (!reviewId) {
        alert("리뷰 ID가 없습니다.");
        return;
      }

      const rating = document.getElementById("ratingInput").value;
      const content = document.getElementById("contentInput").value;

      try {
        await axios.patch(`/api/reviews/${reviewId}/`, { rating, content });
        alert("리뷰 수정 성공!");
        window.location.href = `/books/`;
      } catch (err) {
        alert("리뷰 수정 실패: " + err.response?.data?.detail || err.message);
      }
    });
  </script>
</body>
</html>

<!--POST /api/reviews/ ← 리뷰 등록 URL 맞는지

PATCH /api/reviews/<id>/ ← 리뷰 수정 URL 맞는지

요청 형식이 { book, rating, content }인지-->
